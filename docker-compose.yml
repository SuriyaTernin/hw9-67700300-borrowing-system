version: '3.8'
services:
  web:
    build: .
    container_name: equipment_app_web
    ports:
      - "8082:80"
    volumes:
      - ./hw9-67700300-borrowing-system:/var/www/html
    depends_on:
      - db
  db:
    image: mysql:8.0
    container_name: sports_app_db
    restart: always
    environment:
      MYSQL_DATABASE: equipment_borrow_db
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: equipment_app_pma
    ports:
      - "8083:80"
    environment:
      PMA_HOST: db 
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db
volumes:
  db_data:
